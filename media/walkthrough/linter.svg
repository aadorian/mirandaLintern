  <text x="52" y="168" font-family="sans-serif" font-size="12" fill="var(--vscode-editorWarning-foreground, #cca700)">require-final-newline: missing newline</text>
  <text x="40" y="210" font-family="sans-serif" font-size="13" fill="var(--vscode-descriptionForeground, #9d9d9d)">13 ESLint-style rules with off / warn / error severity</text>
