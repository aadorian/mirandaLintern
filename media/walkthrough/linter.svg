<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="Linter diagnostics">
  <rect width="400" height="240" fill="var(--vscode-editor-background, #1e1e1e)" rx="8"/>
  <text x="40" y="56" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)">flag = </text>
  <text x="96" y="56" font-family="monospace" font-size="14" fill="var(--vscode-errorForeground, #f48771)">true</text>
  <path d="M96 62 H132" stroke="var(--vscode-editorError-foreground, #f14c4c)" stroke-width="2"/>
  <text x="40" y="96" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)">x=1</text>
  <text x="72" y="96" font-family="monospace" font-size="14" fill="var(--vscode-descriptionForeground, #9d9d9d)">   </text>
  <path d="M72 102 H88" stroke="var(--vscode-editorWarning-foreground, #cca700)" stroke-width="2"/>
