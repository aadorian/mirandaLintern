<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="Syntax highlighting">
  <rect width="400" height="240" fill="var(--vscode-editor-background, #1e1e1e)" rx="8"/>
  <text x="40" y="52" font-family="monospace" font-size="14" fill="var(--vscode-symbol-keyword, #569cd6)">qsort</text>
  <text x="80" y="52" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)"> (a:x) = </text>
  <text x="160" y="52" font-family="monospace" font-size="14" fill="var(--vscode-symbol-keyword, #569cd6)">qsort</text>
  <text x="200" y="52" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)"> [ b | b </text>
  <text x="280" y="52" font-family="monospace" font-size="14" fill="var(--vscode-symbol-operator, #d4d4d4)">&lt;-</text>
  <text x="300" y="52" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)"> x;</text>
  <text x="56" y="80" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)">b&lt;=a ] </text>
  <text x="120" y="80" font-family="monospace" font-size="14" fill="var(--vscode-symbol-operator, #d4d4d4)">++</text>
  <text x="144" y="80" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)"> [a] </text>
  <text x="184" y="80" font-family="monospace" font-size="14" fill="var(--vscode-symbol-operator, #d4d4d4)">++</text>
  <text x="208" y="80" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)"> ...</text>
  <rect x="40" y="108" width="8" height="14" fill="var(--vscode-symbol-keyword, #569cd6)"/>
  <text x="56" y="120" font-family="sans-serif" font-size="12" fill="var(--vscode-foreground, #cccccc)">keywords</text>
  <rect x="140" y="108" width="8" height="14" fill="var(--vscode-symbol-operator, #d4d4d4)"/>
  <text x="156" y="120" font-family="sans-serif" font-size="12" fill="var(--vscode-foreground, #cccccc)">operators</text>
  <rect x="250" y="108" width="8" height="14" fill="var(--vscode-symbol-function, #dcdcaa)"/>
  <text x="266" y="120" font-family="sans-serif" font-size="12" fill="var(--vscode-foreground, #cccccc)">stdlib</text>
  <text x="40" y="168" font-family="sans-serif" font-size="13" fill="var(--vscode-descriptionForeground, #9d9d9d)">Comments, directives, types, and comprehensions are highlighted</text>
</svg>
