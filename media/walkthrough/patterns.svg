<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="Pattern matching">
  <rect width="400" height="240" fill="var(--vscode-editor-background, #1e1e1e)" rx="8"/>
  <text x="40" y="56" font-family="monospace" font-size="14" fill="var(--vscode-symbol-keyword, #569cd6)">take</text>
  <text x="72" y="56" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)"> 0 x = []</text>
  <text x="40" y="84" font-family="monospace" font-size="14" fill="var(--vscode-symbol-keyword, #569cd6)">take</text>
  <text x="72" y="84" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)"> (n+1) [] = []</text>
  <text x="40" y="112" font-family="monospace" font-size="14" fill="var(--vscode-symbol-keyword, #569cd6)">take</text>
  <text x="72" y="112" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)"> (n+1) (a:x) = a </text>
  <text x="232" y="112" font-family="monospace" font-size="14" fill="var(--vscode-symbol-operator, #d4d4d4)">:</text>
  <text x="244" y="112" font-family="monospace" font-size="14" fill="var(--vscode-foreground, #cccccc)"> take n x</text>
  <text x="40" y="156" font-family="sans-serif" font-size="13" fill="var(--vscode-descriptionForeground, #9d9d9d)">Case analysis via patterns on numbers, lists, and tuples</text>
</svg>
